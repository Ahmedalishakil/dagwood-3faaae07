<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grilled Perfection Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }

  .banner {
    position: relative;
    width: 900px;
    height: 480px;
    overflow: hidden;
    background: #0d0d0d;
  }

  /* Image fills right 60% */
  .banner-image {
    position: absolute;
    right: 0;
    top: 0;
    width: 65%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  /* Gradient overlay from left dark to transparent */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      #0a0604 0%,
      #0a0604 30%,
      rgba(10,6,4,0.85) 45%,
      rgba(10,6,4,0.4) 65%,
      transparent 100%
    );
    z-index: 1;
  }

  /* Smoke/steam tint overlay */
  .smoke-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(255,160,60,0.08) 0%, transparent 60%);
    z-index: 2;
  }

  /* Content */
  .content {
    position: absolute;
    left: 0;
    top: 0;
    width: 55%;
    height: 100%;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 50px 20px 50px 55px;
  }

  .label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-size: 11px;
    color: #c8833a;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1.0;
    color: #f5ede0;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.4s;
  }

  .headline .accent {
    color: #c8833a;
    display: block;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, #c8833a, transparent);
    margin: 22px 0;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  .sub {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 15px;
    color: rgba(245,237,224,0.65);
    letter-spacing: 0.12em;
    line-height: 1.7;
    max-width: 260px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.8s;
  }

  .cta {
    margin-top: 30px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #c8833a;
    text-decoration: none;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.0s;
    cursor: pointer;
  }

  .cta-line {
    width: 30px;
    height: 1px;
    background: #c8833a;
    transition: width 0.3s ease;
  }

  .cta:hover .cta-line { width: 50px; }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    background: rgba(10,6,4,0.92);
    border-top: 1px solid rgba(200,131,58,0.25);
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 55px;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 1.2s;
  }

  .tag {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(245,237,224,0.4);
  }

  .tag.highlight { color: #c8833a; }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(200,131,58,0.4);
  }
  .dot.active { background: #c8833a; }

  /* Hot badge */
  .badge {
    position: absolute;
    top: 36px;
    right: 36px;
    z-index: 4;
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 1px solid rgba(200,131,58,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,6,4,0.7);
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.4s;
  }

  .badge-text {
    font-family: 'Playfair Display', serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c8833a;
    line-height: 1.6;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
